name: tic_tac_toe_online
description: "Онлайн игра крестики-нолики с мультиплеером, чатом и ботами"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP client for REST API
  http: ^1.2.2

  # WebSocket client (socket_io_client)
  socket_io_client: ^2.0.3+1

  # Local storage for profile caching
  shared_preferences: ^2.3.2

  # State management
  provider: ^6.1.2

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
