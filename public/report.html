<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скачать отчёт проекта — Крестики-Нолики Онлайн</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 50%, #0a0a14 100%);
      color: #f4f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .logo {
      font-size: 64px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4ade80, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .info {
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
      text-align: left;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
    }
    .info-label { color: #94a3b8; }
    .info-value { color: #4ade80; font-weight: 600; }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0a0a14;
      text-decoration: none;
      padding: 18px 36px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
      border: none;
      cursor: pointer;
      width: 100%;
      justify-content: center;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(74, 222, 128, 0.4);
    }
    .download-btn:active { transform: translateY(0); }
    .download-btn svg { width: 22px; height: 22px; }
    .file-info {
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
    }
    .copy-btn {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #f4f4f6;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .copy-btn:hover { background: rgba(255, 255, 255, 0.12); }
    .copy-btn.copied {
      background: rgba(74, 222, 128, 0.15);
      border-color: rgba(74, 222, 128, 0.4);
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⭕❌</div>
    <h1>Отчёт проекта</h1>
    <p class="subtitle">Крестики-Нолики Онлайн v2.1.2<br>Полная документация для AI-агента</p>

    <div class="info">
      <div class="info-row">
        <span class="info-label">Формат:</span>
        <span class="info-value">Markdown (.md)</span>
      </div>
      <div class="info-row">
        <span class="info-label">Размер:</span>
        <span class="info-value">24 KB</span>
      </div>
      <div class="info-row">
        <span class="info-label">Строк:</span>
        <span class="info-value">526</span>
      </div>
      <div class="info-row">
        <span class="info-label">Включает:</span>
        <span class="info-value">API ключи + инструкцию</span>
      </div>
    </div>

    <a href="/PROJECT_REPORT_FOR_AGENT.md" download="PROJECT_REPORT_FOR_AGENT.md" class="download-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
      Скачать отчёт (.md)
    </a>

    <p class="file-info">Файл скачается сразу при нажатии</p>

    <button class="copy-btn" onclick="copyReport()">
      📋 Скопировать содержимое в буфер обмена
    </button>
  </div>

  <script>
    async function copyReport() {
      try {
        const res = await fetch('/PROJECT_REPORT_FOR_AGENT.md');
        const text = await res.text();
        await navigator.clipboard.writeText(text);
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✓ Скопировано!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 Скопировать содержимое в буфер обмена';
          btn.classList.remove('copied');
        }, 2000);
      } catch (e) {
        alert('Не удалось скопировать. Скачай файл кнопкой выше.');
      }
    }
  </script>
</body>
</html>
